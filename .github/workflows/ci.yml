name: CI Pipeline

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r app_demo/requirements.txt

      # 👇 AQUÍ VA BLACK
      - name: Check formatting with black
        run: |
          pip install black
          black .

      # 👇 LUEGO FLAKE8
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app_demo/src app_demo/tests
