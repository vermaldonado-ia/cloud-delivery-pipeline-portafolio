name: CI Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r app_demo/requirements.txt
          pip install black flake8 pytest pytest-cov

      - name: Validar formato con Black
        run: |
          black --check app_demo

      - name: Analizar código con Flake8
        run: |
          flake8 app_demo/src app_demo/tests

      - name: Ejecutar tests con Pytest y Coverage
        run: |
          cd app_demo
          PYTHONPATH=. pytest --cov=src --cov-report=term-missing
