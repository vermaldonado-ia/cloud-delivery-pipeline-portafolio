name: CI Pipeline

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci_validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          cd app_demo
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generar archivo de coverage
        run: |
          cd app_demo
          PYTHONPATH=. pytest --cov=src --cov-report=term --cov-report=xml --cov-fail-under=80 > coverage.txt

      - name: Extraer porcentaje de coverage
        run: |
          COVERAGE=$(grep -o '[0-9]\+%' coverage.txt | tail -1)
          echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

      - name: Generar archivo de coverage
        run: |
          cd app_demo
          PYTHONPATH=. pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=80 | tee coverage.txt

      - name: Subir badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: coverage-badge.md
