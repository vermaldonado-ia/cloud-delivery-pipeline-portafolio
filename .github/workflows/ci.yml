name: CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ci_validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          cd app_demo
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar tests con coverage
        run: |
          cd app_demo
          PYTHONPATH=. pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=80 | tee coverage.txt

      - name: Ejecutar validación de calidad (flake8)
        run: |
          cd app_demo
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src --count --max-complexity=10 --max-line-length=88 --statistics

      - name: Subir coverage.txt
        uses: actions/upload-artifact@v4
        with:
          name: coverage-file
          path: app_demo/coverage.txt
