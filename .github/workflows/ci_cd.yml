name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          cd app_demo
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar tests con coverage
        run: |
          cd app_demo
          PYTHONPATH=. pytest --cov=src --cov-report=term-missing tests/

  quality:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          cd app_demo
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar validación de calidad
        run: |
          cd app_demo
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src --count --max-complexity=10 --max-line-length=88 --statistics

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Generar sitio de despliegue
        run: |
          mkdir -p site
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Cloud Delivery Pipeline Portafolio</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 40px;
                background: #f7f9fc;
                color: #1f2937;
              }
              .card {
                max-width: 800px;
                margin: auto;
                background: white;
                padding: 32px;
                border-radius: 12px;
                box-shadow: 0 4px 16px rgba(0,0,0,0.08);
              }
              h1 { color: #111827; }
              .ok {
                color: #15803d;
                font-weight: bold;
              }
              code {
                background: #eef2ff;
                padding: 2px 6px;
                border-radius: 6px;
              }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>🚀 Cloud Delivery Pipeline Portafolio</h1>
              <p class="ok">Deploy real publicado con GitHub Pages</p>
              <p>Este sitio fue desplegado automáticamente desde el pipeline <code>CI/CD Pipeline</code> después de aprobar:</p>
              <ul>
                <li>Tests automatizados</li>
                <li>Coverage con pytest-cov</li>
                <li>Quality Gate simulado con flake8</li>
              </ul>
              <p>Este despliegue demuestra una evolución desde un CD simulado hacia un despliegue real y visible para portafolio.</p>
            </div>
          </body>
          </html>
          EOF

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
