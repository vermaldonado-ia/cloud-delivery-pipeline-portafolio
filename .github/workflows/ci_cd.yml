name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:

  # -------------------------
  # 1. CI - Tests
  # -------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          cd app_demo
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar tests
        run: |
          cd app_demo
          PYTHONPATH=. pytest tests/

  # -------------------------
  # 2. Quality Gate Simulado
  # -------------------------
  quality:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          cd app_demo
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar validación de calidad (flake8)
        run: |
          cd app_demo
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src --count --max-complexity=10 --max-line-length=88 --statistics

  # -------------------------
  # 3. CD Simulado
  # -------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Simulación de despliegue
        run: echo "Deploy ejecutado correctamente 🚀"
